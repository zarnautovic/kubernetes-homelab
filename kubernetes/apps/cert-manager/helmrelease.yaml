apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: cert-manager
spec:
  interval: 30m
  chart:
    spec:
      chart: cert-manager
      # Step 1.17 -> 1.19 -> 1.20 (1.18 doesn't support K8s 1.35). Bump to v1.20.x
      # once 1.19 is verified healthy.
      version: "v1.19.x"
      sourceRef:
        kind: HelmRepository
        name: jetstack
        namespace: flux-system
  values:
    crds:
      enabled: true