apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: longhorn-system
spec:
  interval: 30m
  chart:
    spec:
      chart: longhorn
      # Auto-patch within the current minor; minor/major bumps require a manual
      # edit so storage-engine migrations are reviewed before they roll out.
      version: ">=1.12.0 <1.13.0"
      sourceRef:
        kind: HelmRepository
        name: longhorn
        namespace: longhorn-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    defaultSettings:
      defaultDataPath: /var/mnt/longhorn
      defaultReplicaCount: 3
      storageMinimalAvailablePercentage: 10
      # Drains wait if the node holds a volume's last healthy replica, so a
      # rolling Talos upgrade can't take out a degraded volume's only copy.
      nodeDrainPolicy: block-if-contains-last-replica
      backupTarget: nfs://192.168.1.101:/mnt/backup-pool/backup?nfsOptions=nfsvers=3,nolock
      # Live-upgrade volume engines to the default (chart) engine image, 1 per node at a
      # time, so engines never drift behind the Longhorn version on future upgrades.
      concurrentAutomaticEngineUpgradePerNodeLimit: 1
    persistence:
      defaultClass: true
      defaultClassReplicaCount: 3
      migratable: true
