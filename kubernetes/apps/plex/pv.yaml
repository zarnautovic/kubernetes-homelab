apiVersion: v1
kind: PersistentVolume
metadata:
  name: plex-media-nfs
spec:
  capacity:
    storage: 3Ti
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  nfs:
    server: 192.168.1.101
    path: /mnt/main-pool/media
  claimRef:
    name: plex-media
    namespace: plex
